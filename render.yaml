services:
  - type: web
    name: buildconnect
    env: python
    buildCommand: ./render-build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: buildconnect_db
          property: connectionString

databases:
  - name: buildconnect_db
    databaseName: buildconnect
    user: buildconnect_user
